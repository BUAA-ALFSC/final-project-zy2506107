seed: 0
output_dir: './output_smoke'
load_checkpoint: ''
src_strategy_path_or_dir: ''
auto_trans_ckpt: False
only_save_strategy: False
resume_training: False
use_parallel: False
run_mode: 'predict'

trainer:
  type: CausalLanguageModelingTrainer
  model_name: 'qwen_7b'

train_dataset: &train_dataset
  data_loader:
    type: MindDataset
    dataset_dir: ""
    shuffle: True
  input_columns: ["input_ids", "labels", "attention_mask"]
  num_parallel_workers: 1
  python_multiprocessing: False
  drop_remainder: True
  batch_size: 1
  repeat: 1
  numa_enable: False
  prefetch_size: 1
train_dataset_task:
  type: CausalLanguageModelDataset
  dataset_config: *train_dataset

runner_config:
  epochs: 1
  batch_size: 1
  sink_mode: True
  sink_size: 1
runner_wrapper:
  type: MFTrainOneStepCell
  scale_sense:
    type: DynamicLossScaleUpdateCell
    loss_scale_value: 65536
    scale_factor: 2
    scale_window: 1000
  use_clip_grad: True

optimizer:
  type: AdamWeightDecayX
  beta1: 0.9
  beta2: 0.95
  eps: 1.e-8
  weight_decay: 0.1

lr_schedule:
  type: CosineWithWarmUpLR
  learning_rate: 1.e-5
  lr_end: 1.e-5
  warmup_ratio: 0
  total_steps: -1

callbacks:
  - type: MFLossMonitor
  - type: ObsMonitor

parallel_config:
  data_parallel: 1
  model_parallel: 1
  pipeline_stage: 1
  micro_batch_num: 1
  vocab_emb_dp: False
  gradient_aggregation_group: 4
micro_batch_interleave_num: 1

recompute_config:
  recompute: False
  select_recompute: False
  parallel_optimizer_comm_recompute: False
  mp_comm_recompute: False
  recompute_slice_activation: False

model:
  model_config:
    type: QwenConfig
    batch_size: 1
    seq_length: 128
    hidden_size: 4096
    num_layers: 32
    num_heads: 32
    vocab_size: 151936
    intermediate_size: 11008
    rms_norm_eps: 1.0e-6
    emb_dropout_prob: 0.0
    eos_token_id: 151643
    pad_token_id: 151643
    compute_dtype: "float16"
    layernorm_compute_type: "float32"
    softmax_compute_type: "float32"
    rotary_dtype: "float32"
    param_init_type: "float16"
    use_past: True
    use_flash_attention: False
    is_dynamic: True
    block_size: 16
    num_blocks: 16
    offset: 0
    checkpoint_name_or_path: "/model/mindformers_models/qwen_7b/qwen_7b_base.ckpt"
    repetition_penalty: 1
    max_decode_length: 8
    top_k: 0
    top_p: 0.8
    do_sample: False
    rotary_pct: 1.0
    rotary_emb_base: 10000
    kv_channels: 128

  arch:
    type: QwenForCausalLM

processor:
  return_tensors: ms
  tokenizer:
    model_max_length: 512
    vocab_file: "/model/mindformers_models/qwen_7b/qwen.tiktoken"
    pad_token: "<|endoftext|>"
    type: QwenTokenizer
  type: QwenProcessor

context:
  mode: 0
  device_target: "Ascend"
  enable_graph_kernel: False
  ascend_config:
    precision_mode: "must_keep_origin_dtype"
  max_call_depth: 10000
  max_device_memory: "56GB"
  save_graphs: False
  save_graphs_path: "./graph_smoke"
  device_id: 0

parallel:
  parallel_mode: 0
  gradients_mean: False
  enable_alltoall: False
  full_batch: True
  search_mode: "sharding_propagation"
  enable_parallel_optimizer: False
  strategy_ckpt_config:
    save_file: "./ckpt_strategy.ckpt"
    only_trainable_params: False
  parallel_optimizer_config:
    gradient_accumulation_shard: False
    parallel_optimizer_threshold: 64
